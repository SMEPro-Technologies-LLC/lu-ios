{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iosme-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
    app: iosme-ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iosme-ollama
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "iosme-lamar.selectorLabels" . | nindent 8 }}
        app: iosme-ollama
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ollama.service.port }}
              name: ollama
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
      {{- with .Values.ollama.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: ollama-data
          {{- if .Values.ollama.persistence.enabled }}
          persistentVolumeClaim:
            claimName: iosme-ollama-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.ollama.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iosme-ollama-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.ollama.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.ollama.persistence.size }}
  {{- if .Values.ollama.persistence.storageClass }}
  storageClassName: {{ .Values.ollama.persistence.storageClass }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: iosme-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
    app: iosme-ollama
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ollama.service.port }}
      targetPort: {{ .Values.ollama.service.port }}
      protocol: TCP
      name: ollama
  selector:
    app: iosme-ollama
{{- end }}
