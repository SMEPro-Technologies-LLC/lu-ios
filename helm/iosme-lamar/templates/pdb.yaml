{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "iosme-lamar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "iosme-lamar.selectorLabels" . | nindent 6 }}
      app: iosme-app
{{- end }}
