# =============================================================================
# values.yaml — DEFAULT / REFERENCE VALUES
# =============================================================================
# !! WARNING: This file is for reference and local development DRY-RUN only.
# !!          DO NOT deploy directly from this file in any production cluster.
# !!          Use values-lamar-prod.yaml for production overrides.
# =============================================================================

# Target Kubernetes namespace
namespace: iosme

# ---------------------------------------------------------------------------
# API Gateway / Policy Engine
# ---------------------------------------------------------------------------
api:
  replicas: 2
  image:
    # TODO: Replace with the production container registry path
    repository: ghcr.io/lamar-university/iosme-api
    tag: v1.0.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  service:
    port: 8000

# ---------------------------------------------------------------------------
# Celery Worker Pool
# ---------------------------------------------------------------------------
worker:
  replicas: 2
  image:
    # TODO: Replace with the production container registry path
    repository: ghcr.io/lamar-university/iosme-worker
    tag: v1.0.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "0.5"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# LTI 1.3 Tool Provider Service
# ---------------------------------------------------------------------------
ltiService:
  replicas: 1
  image:
    # TODO: Replace with the production container registry path
    repository: ghcr.io/lamar-university/iosme-lti
    tag: v1.0.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "0.25"
      memory: "256Mi"
    limits:
      cpu: "0.5"
      memory: "512Mi"
  service:
    port: 8080

# ---------------------------------------------------------------------------
# PostgreSQL 15 StatefulSet
# ---------------------------------------------------------------------------
postgres:
  # Storage class for PersistentVolumeClaims.
  # TODO: Set to the cluster-specific storage class (e.g. ios-san-fast)
  storageClass: standard
  # Primary node storage size
  storageSize: 10Gi
  # nodeSelector pins StatefulSet pods to labelled nodes (db-01 / db-02).
  # TODO: Apply node label node-role.kubernetes.io/db=true to DB nodes.
  nodeSelector: {}
  tolerations: []

# ---------------------------------------------------------------------------
# Redis 7 Cache / Queue
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "0.25"
      memory: "512Mi"
    limits:
      cpu: "0.5"
      memory: "512Mi"
  persistence:
    enabled: false
    size: 1Gi
    # TODO: Set to the cluster-specific storage class
    storageClass: standard

# ---------------------------------------------------------------------------
# Ingress (NGINX + cert-manager)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  # TODO: Replace with the actual FQDN for this deployment
  host: ios-lti.lamar.edu
  tls:
    enabled: true
    certManager: true
    # TODO: Replace with the correct cert-manager ClusterIssuer name
    clusterIssuer: lamar-letsencrypt-prod

# ---------------------------------------------------------------------------
# HorizontalPodAutoscaler (disabled by default)
# ---------------------------------------------------------------------------
hpa:
  enabled: false
  api:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  worker:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# PodDisruptionBudget
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  # Leave empty to auto-generate from chart fullname
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Secret Management
# ---------------------------------------------------------------------------
secrets:
  # Options: vault | sops | manual
  # vault  — expects External Secrets Operator + HashiCorp Vault
  # sops   — expects helm-secrets / mozilla sops encrypted values
  # manual — placeholder Secrets rendered by this chart (NOT for production)
  source: manual
  vault:
    # TODO: Set to the Vault cluster address
    addr: "https://vault.lamar.edu:8200"
    role: "iosme-prod"
    path: "iosme/data"

# ---------------------------------------------------------------------------
# §08 Compliance Flags (hard constraints — DO NOT change without approval)
# ---------------------------------------------------------------------------
compliance:
  scope: education-only
  regimes:
    - FERPA
    - SACSCOC
    - TitleIX
    - ADA508
    - TexasEdCode
    - AACSB
    - ABET
  # §08 Banner Integrity — must be false at all times
  bannerDirectMutation: false
  # §08 Copilot Audit-Only — must be false at all times
  copilotInterception: false
  # §08 Blockchain disabled — must be false without Provost CR
  blockchainAnchor: false
