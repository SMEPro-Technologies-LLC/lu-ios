{{- if .Values.serviceAccount.create }}
# Minimal Role — grants only what is required for the IOS+ pods to operate.
# Principle of least privilege per §08 compliance requirements.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "iosme-lamar.fullname" . }}-role
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
rules:
  # Allow pods to read their own ConfigMaps and Secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Allow pods to read their own pod spec (for self-inspection / health)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "iosme-lamar.fullname" . }}-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "iosme-lamar.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "iosme-lamar.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
