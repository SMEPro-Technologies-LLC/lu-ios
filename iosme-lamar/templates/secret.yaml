# =============================================================================
# secret.yaml — SECRET TEMPLATES (PLACEHOLDER)
# =============================================================================
# NOTE: This file renders placeholder Kubernetes Secrets whose values are
# set to the literal string "REPLACED_BY_VAULT".
#
# In production (secrets.source=vault) these objects are managed by the
# External Secrets Operator (ESO) pulling from HashiCorp Vault.  The
# templates here exist only so that `helm template` / `helm install --dry-run`
# produces a renderable chart and developers can see which secrets are
# expected.
#
# NEVER commit real credentials to this file or any values file.
# =============================================================================

# --- Database credentials ---
apiVersion: v1
kind: Secret
metadata:
  name: iosme-db-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
  annotations:
    secret.lamar.edu/source: {{ .Values.secrets.source | quote }}
    secret.lamar.edu/vault-path: "{{ .Values.secrets.vault.path }}/db"
    # TODO: Once ESO is installed, replace this Secret with an ExternalSecret
    # resource pointing to the Vault path above.
type: Opaque
stringData:
  url: "REPLACED_BY_VAULT"
  username: "REPLACED_BY_VAULT"
  password: "REPLACED_BY_VAULT"

