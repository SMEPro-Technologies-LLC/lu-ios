{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "iosme-lamar.fullname" . }}-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    {{- if .Values.ingress.tls.certManager }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    cert-manager.io/acme-challenge-type: "http01"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: iosme-tls-cert
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1/ai
            pathType: Prefix
            backend:
              service:
                name: {{ include "iosme-lamar.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
          - path: /lti/v1p3/launch
            pathType: Prefix
            backend:
              service:
                name: {{ include "iosme-lamar.fullname" . }}-lti-service
                port:
                  number: {{ .Values.ltiService.service.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "iosme-lamar.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
