apiVersion: v1
kind: Service
metadata:
  name: {{ include "iosme-lamar.fullname" . }}-lti-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "iosme-lamar.labels" . | nindent 4 }}
    app.kubernetes.io/component: lti-service
spec:
  type: ClusterIP
  selector:
    {{- include "iosme-lamar.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: lti-service
  ports:
    - name: http
      port: {{ .Values.ltiService.service.port }}
      targetPort: http
      protocol: TCP
