# templates/api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iosme-lamar.fullname" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: api
    compliance.lamar.edu/data-classification: restricted
spec:
  replicas: {{ .Values.api.replicas }}  # Default: 2 (§01.3)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "iosme-lamar.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - api
              topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          command: ["uvicorn"]
          args: ["app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
          envFrom:
            - configMapRef:
                name: iosme-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iosme-db-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: iosme-redis-credentials
                  key: url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iosme-anthropic-api-key
                  key: token
            - name: BANNER_ETHOS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iosme-banner-credentials
                  key: ethos-api-key
            - name: LTI_JWS_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: iosme-lti-keypair
                  key: private-key
            - name: VAULT_ADDR
              valueFrom:
                secretKeyRef:
                  name: iosme-vault-config
                  key: addr
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}