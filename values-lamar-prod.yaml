# values-lamar-prod.yaml
# Production overrides for Lamar University
# Reference this file during deployment: helm install iosme-lamar ./iosme-lamar -f values-lamar-prod.yaml

namespace: iosme

replicaCount:
  api: 2
  worker: 2
  lti: 1

api:
  image:
    repository: ghcr.io/lamar-university/iosme-api
    tag: v1.0.0
  replicas: 2
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

worker:
  image:
    repository: ghcr.io/lamar-university/iosme-worker
    tag: v1.0.0
  replicas: 2
  resources:
    requests:
      cpu: "0.5"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

postgres:
  storageClass: ios-san-fast
  storageSize: 2Ti
  primary:
    nodeSelector:
      node-role.kubernetes.io/db: "true"
  replica:
    nodeSelector:
      node-role.kubernetes.io/db: "true"
    storageSize: 4Ti

redis:
  enabled: true
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ios-san-standard

gpu:
  enabled: true
  nodeSelector:
    node-role.kubernetes.io/gpu: "true"
  resources:
    limits:
      nvidia.com/gpu: 2
  inference:
    model: llama-3.3-70b-int8
    embeddingModel: bge-m3

ingress:
  enabled: true
  className: nginx
  host: ios-lti.lamar.edu
  tls:
    enabled: true
    certManager: true
    clusterIssuer: lamar-letsencrypt-prod

hpa:
  enabled: false  # Disabled by default at Lamar scale; enable after Phase 4 load testing
  api:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  worker:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceAccount:
  create: true
  name: iosme-sa

secrets:
  source: vault  # Options: vault, sops, manual
  vault:
    addr: "https://vault.lamar.edu:8200"
    role: "iosme-prod"
    path: "iosme/data"

# === §08 Compliance Overrides ===
compliance:
  scope: education-only
  regimes:
    - FERPA
    - SACSCOC
    - TitleIX
    - ADA508
    - TexasEdCode
    - AACSB
    - ABET
  bannerDirectMutation: false
  copilotInterception: false
  blockchainAnchor: false